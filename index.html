<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 10px 18px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #574fd6;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 6px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #6c63ff;
      color: #6c63ff;
      font-weight: 600;
    }

    #todo-list {
      list-style: none;
    }

    #todo-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-bottom: 1px solid #f0f0f0;
      transition: opacity 0.2s;
    }

    #todo-list li:last-child {
      border-bottom: none;
    }

    #todo-list li.done .todo-text {
      text-decoration: line-through;
      color: #aaa;
    }

    #todo-list li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-word;
    }

    .edit-btn, .delete-btn {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .edit-btn {
      color: #ccc;
    }

    .edit-btn:hover {
      color: #6c63ff;
    }

    .delete-btn {
      color: #ccc;
      font-size: 18px;
    }

    .delete-btn:hover {
      color: #e74c3c;
    }

    .edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 2px solid #6c63ff;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
    }

    .save-btn {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .save-btn:hover {
      background: #574fd6;
    }

    .cancel-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      flex-shrink: 0;
    }

    .cancel-btn:hover {
      color: #333;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #999;
    }

    .footer button {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 13px;
      cursor: pointer;
    }

    .footer button:hover {
      text-decoration: underline;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapılacaklar</h1>
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="Yeni görev ekle..." maxlength="200">
      <button onclick="addTodo()">Ekle</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>
    <ul id="todo-list"></ul>
    <div class="footer">
      <span id="count"></span>
      <button onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    const input = document.getElementById('todo-input');
    const list = document.getElementById('todo-list');
    const countEl = document.getElementById('count');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function startEdit(id) {
      const li = document.querySelector(`li[data-id="${id}"]`);
      const todo = todos.find(t => t.id === id);
      li.innerHTML = `
        <input class="edit-input" value="${escape(todo.text)}" maxlength="200" onkeydown="handleEditKey(event, ${id})">
        <button class="save-btn" onclick="saveEdit(${id})">Kaydet</button>
        <button class="cancel-btn" onclick="render()">&#x2715;</button>
      `;
      li.querySelector('.edit-input').focus();
    }

    function handleEditKey(e, id) {
      if (e.key === 'Enter') saveEdit(id);
      if (e.key === 'Escape') render();
    }

    function saveEdit(id) {
      const li = document.querySelector(`li[data-id="${id}"]`);
      const newText = li.querySelector('.edit-input').value.trim();
      if (!newText) return;
      const todo = todos.find(t => t.id === id);
      todo.text = newText;
      save();
      render();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.done = !todo.done;
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const visible = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (visible.length === 0) {
        list.innerHTML = '<li class="empty">Görev yok</li>';
      } else {
        list.innerHTML = visible.map(t => `
          <li class="${t.done ? 'done' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
            <span class="todo-text">${escape(t.text)}</span>
            <button class="edit-btn" onclick="startEdit(${t.id})" title="Düzenle">&#x270E;</button>
            <button class="delete-btn" onclick="deleteTodo(${t.id})" title="Sil">&#x2715;</button>
          </li>
        `).join('');
      }

      const active = todos.filter(t => !t.done).length;
      countEl.textContent = `${active} görev kaldı`;
    }

    function escape(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
  </script>
</body>
</html>
